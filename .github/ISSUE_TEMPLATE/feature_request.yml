name: Feature request
description: Suggest an improvement to dcleaner
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What task is hard or verbose today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API
      description: What would the new method / syntax look like?
      render: python
    validations:
      required: true
