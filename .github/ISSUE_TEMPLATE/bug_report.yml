name: Bug report
description: Report a problem with dcleaner
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Code snippet that triggers the problem.
      render: python
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: dcleaner version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11"
    validations:
      required: true
